name: Publish

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: questlog
          POSTGRES_PASSWORD: questlog
          POSTGRES_DB: questlog
        ports:
          - 5435:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --include=optional

      - name: Initialize test database
        run: |
          PGPASSWORD=questlog psql -h localhost -p 5435 -U questlog -d questlog -f apps/questlog/docker/test/postgresql-init/dump.sql
        env:
          PGPASSWORD: questlog

      - name: Run lint
        run: npm run lint

      - name: Run build and typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run e2e
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://questlog:questlog@localhost:5435/questlog
          DB_HOST: localhost
          DB_PORT: 5435
          DB_USER: questlog
          DB_PASSWORD: questlog
          DB_NAME: questlog

  publish:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install --include=optional

      - name: Build packages
        run: npm run build

      - name: Publish packages
        run: |
          PACKAGES="packages/core packages/pg packages/backend packages/frontend packages/cli packages/create"
          for pkg in $PACKAGES; do
            NAME=$(node -p "require('./$pkg/package.json').name")
            VERSION=$(node -p "require('./$pkg/package.json').version")
            if npm view "$NAME@$VERSION" version 2>/dev/null; then
              echo "⏭  $NAME@$VERSION already published, skipping"
            else
              echo "📦 Publishing $NAME@$VERSION..."
              (cd "$pkg" && npm publish --access public)
              echo "✅ $NAME@$VERSION published"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
